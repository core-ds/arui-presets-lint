name: Tests

on: [pull_request]

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v6
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: yarn

            - name: Install dependencies
              run: |
                  yarn install --immutable

            - name: Run tests
              run: |
                  yarn test
